name: Daily Python Script

on:
  schedule:
    - cron: '0 13 * * *'  # 7:00 AM Central (UTC-6 standard / UTC-5 daylight)
  push:
  workflow_dispatch:       # Allow manual runs from GitHub UI

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format
        run: uv run ruff format . --diff

      # - name: Run pyright
      #   run: uv run pyright .

  daily-projections:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Fetch injuries
        run: uv run python fetch_injuries.py --source mlb

      - name: Run projections
        run: |
          uv run python manage.py \
            --roster-file inputs/my_roster.txt \
            --hitters inputs/hitters.csv \
            --pitchers inputs/pitchers.csv \
            --injuries outputs/injuries.json

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: daily-projections-${{ github.run_id }}
          path: outputs/
